<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PAC Door Viewer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; }

      /* Resizable panel dividers */
      .resize-handle-h[data-separator] {
        width: 4px;
        background: #335577;
        transition: background 0.15s;
      }
      .resize-handle-h[data-separator]:hover,
      .resize-handle-h[data-separator][data-active] {
        background: #5599cc;
      }
      .resize-handle-v[data-separator] {
        height: 4px;
        background: #335577;
        transition: background 0.15s;
      }
      .resize-handle-v[data-separator]:hover,
      .resize-handle-v[data-separator][data-active] {
        background: #5599cc;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
